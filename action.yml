---
name: "aibomgen-cli Action"
description: "Generates an AI Bill of Materials (AIBOM) for ML model files using aibomgen-cli"
author: "IDLab Discover"
branding:
  color: blue
  icon: cpu

inputs:
  command:
    required: true
    description: "The aibomgen-cli command to execute: download, scan, generate, validate, completeness, vuln-scan, merge"
    default: "scan"

  scan-input:
    required: false
    description: "Directory path for command=scan"
    default: "."

  generate-model-ids:
    required: false
    description: "Comma or newline-separated Hugging Face model IDs for command=generate"

  validate-input:
    required: false
    description: "Path to an existing AIBOM file for command=validate"

  validate-strict:
    required: false
    description: "Enable strict validation mode for command=validate"
    default: "false"

  validate-min-score:
    required: false
    description: "Minimum completeness score (0..1) for command=validate"

  validate-check-model-card:
    required: false
    description: "Validate model card fields for command=validate"
    default: "false"

  completeness-input:
    required: false
    description: "Path to an existing AIBOM file for command=completeness"

  completeness-plain-summary:
    required: false
    description: "Emit plain machine-readable summary for command=completeness"
    default: "false"

  vuln-scan-input:
    required: false
    description: "Path to an existing AIBOM file for command=vuln-scan"

  vuln-scan-enrich:
    required: false
    description: "Inject vulnerability findings back into the AIBOM for command=vuln-scan"
    default: "false"

  vuln-scan-no-preview:
    required: false
    description: "Skip save preview prompt when command=vuln-scan and enrich is enabled"
    default: "false"

  vuln-scan-output-format:
    required: false
    description: "Output format for enriched AIBOM in command=vuln-scan"
    default: "auto"

  merge-aibom-files:
    required: false
    description: "Comma or newline-separated AIBOM file paths for command=merge"

  merge-sbom-file:
    required: false
    description: "SBOM file path for command=merge"

  merge-output-file:
    required: false
    description: "Output merged BOM file path for command=merge"

  merge-deduplicate:
    required: false
    description: "Deduplicate components by bom-ref for command=merge"
    default: "true"

  format:
    required: false
    description: "BOM format input for command operations: json, xml, auto"
    default: "auto"

  output-file:
    required: false
    description: "Output file path for commands that support writing files"

  spec-version:
    required: false
    description: "CycloneDX spec version (for commands supporting --spec)"

  hf-token:
    required: false
    description: "Hugging Face access token for private/gated models"

  hf-mode:
    required: false
    description: "Hugging Face metadata mode for scan/generate: online or dummy"
    default: "online"

  hf-timeout:
    required: false
    description: "Hugging Face timeout in seconds"
    default: "0"

  no-security-scan:
    required: false
    description: "Disable HF security scan enrichment on scan/generate"
    default: "false"

  config:
    required: false
    description: "Path to an aibomgen-cli configuration file (--config)"

  log-level:
    required: false
    description: "Log verbosity: quiet, standard, debug"
    default: "standard"

  aibomgen-version:
    required: false
    description: "aibomgen-cli version to use (for example v0.2.1)"
    default: "v0.2.1"

  aibomgen-sha256:
    required: false
    description: "Optional SHA256 checksum for downloaded release archive"

  github-token:
    description: "GitHub token used for uploading artifacts and release assets"
    required: false
    default: ${{ github.token }}

  artifact-name:
    description: "The name to use for the uploaded workflow artifact"
    required: false

  upload-artifact:
    required: false
    description: "Upload generated output files as a workflow artifact"
    default: "true"

  upload-artifact-retention:
    required: false
    description: >
      Retention policy in days for the uploaded workflow artifact.
      Minimum 1 day, maximum 90 days (repository default if 0).
    default: "0"

  upload-release-assets:
    required: false
    description: "Attach matched workflow artifacts to a release on release/tag events"
    default: "true"

  aibom-artifact-match:
    required: false
    description: "Pattern used to select artifacts for release upload"

  aibom-artifact-match-mode:
    required: false
    description: "Pattern mode for aibom-artifact-match: exact or glob"
    default: "exact"

  release-ref-prefix:
    required: false
    description: "Ref prefix used to detect release pushes (default: refs/tags/)"

outputs:
  cmd:
    description: "A reference to the aibomgen-cli command (set when command=download)"

  executed-command:
    description: "The command that was executed"

  written-files:
    description: "Newline-separated output file paths discovered by the action"

runs:
  using: "node20"
  main: "dist/index.cjs"
