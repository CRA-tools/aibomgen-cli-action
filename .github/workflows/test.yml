name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["24"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run build

      - name: Format check
        run: npm run format-check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Package
        run: npm run package

      - name: Ensure dist is up to date
        if: matrix.node-version == '24'
        run: |
          git diff --exit-code dist/ || \
          (echo "ERROR: dist/ is out of date. Run 'npm run package' and commit the result." && exit 1)

  smoke-action:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Resolve CLI with local action
        id: download
        uses: ./
        with:
          command: download
          upload-artifact: "false"
          upload-release-assets: "false"

      - name: Verify command output
        run: |
          test -n "${{ steps.download.outputs.cmd }}"
          echo "Resolved cmd: ${{ steps.download.outputs.cmd }}"
